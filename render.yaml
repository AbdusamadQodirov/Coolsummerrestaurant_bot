services:
  - type: web
    name: Coolsummerrestaurant_bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python restaurant_bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: YANDEX_DELIVERY_TOKEN
        sync: false
      - key: OWNER_TELEGRAM_ID
        sync: false
